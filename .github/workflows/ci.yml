name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build runtime
        shell: pwsh
        run: .\scripts\build_runtime.ps1

      - name: Static checks
        shell: pwsh
        run: |
          if (-not (Test-Path ".build/bin/meccha-camouflage.exe")) { throw "runtime exe missing" }
          if (-not (Test-Path ".build/bin/meccha-xenos-bridge.dll")) { throw "bridge dll missing" }
          foreach ($path in @("native", "src", "pyproject.toml", "requirements.txt")) {
            if (Test-Path $path) { throw "removed path still exists: $path" }
          }

      - name: Package dry run
        shell: pwsh
        run: |
          .\scripts\package_release.ps1 -Version 1.0.0-ci
          if (-not (Test-Path ".build/package/meccha-camouflage-1.0.0-ci.zip")) { throw "package zip missing" }

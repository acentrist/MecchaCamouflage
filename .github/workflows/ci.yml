name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  native-build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build native runtime
        shell: pwsh
        run: |
          .\scripts\build_native.ps1

      - name: Static runtime checks
        shell: pwsh
        run: |
          if (-not (Test-Path ".build/native/bin/meccha-camouflage.exe")) { throw "runtime exe missing" }
          if (-not (Test-Path ".build/native/bin/meccha-xenos-bridge.dll")) { throw "bridge dll missing" }
          foreach ($path in @("src", "pyproject.toml", "requirements.txt", "scripts/build_exe.ps1")) {
            if (Test-Path $path) { throw "removed runtime path still exists: $path" }
          }

      - name: Package dry run
        shell: pwsh
        run: |
          .\scripts\package_release.ps1 -Version 0.1.0-ci
          if (-not (Test-Path ".build/package/meccha-camouflage-0.1.0-ci.zip")) { throw "package zip missing" }

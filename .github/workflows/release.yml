name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version, for example 1.0.0"
        required: false
        default: "1.0.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) { $version = "${{ github.ref_name }}" }
          $version = $version.TrimStart("v")
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build runtime
        shell: pwsh
        run: .\scripts\build_runtime.ps1

      - name: Package
        shell: pwsh
        run: .\scripts\package_release.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meccha-camouflage
          path: .build/package/*.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .build/package/*.zip
